<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aurora Placement Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/static/css/dashboard-theme.css">

    <style>
        /* Specific adjustments for the login layout to ensure it centers perfectly */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 900px;
            margin: 0;
        }
        .auth-sidebar {
            background: linear-gradient(180deg, rgba(255,0,128,0.05), rgba(121,40,202,0.15));
            border-right: 1px solid var(--glass-border);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
        }
    </style>
</head>
<body class="app-shell">

    <div id="loginApp" class="login-wrapper">
        <div class="glass-card login-card">
            <div class="row g-0 h-100">
                
                <div class="col-md-5 d-none d-md-block">
                    <div class="auth-sidebar">
                        <div class="mb-4" style="width: 80px; height: 80px; border-radius: 20px; background: var(--aurora-gradient); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 24px -6px var(--aurora-glow);">
                            <i class="fas fa-bolt text-white fs-1"></i>
                        </div>
                        <h2 class="font-display text-white mb-3">Welcome Back!</h2>
                        <p class="text-dim mb-4" style="font-size: 0.95rem; line-height: 1.6;">
                            Enter your credentials to access the placement portal and manage your journey.
                        </p>
                        <div class="mt-4 pt-4 w-100" style="border-top: 1px solid var(--glass-border-soft);">
                            <p class="text-faint font-mono mb-3" style="font-size: 0.75rem;">DON'T HAVE AN ACCOUNT?</p>
                            <a href="/signup" class="btn-outline-glass w-100 d-block text-center text-decoration-none">
                                Create Account
                            </a>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="p-4 p-md-5">
                        
                        <div class="mb-5">
                            <span class="font-mono text-aurora mb-2 d-block" style="font-size: 0.8rem; letter-spacing: 0.1em; color: var(--aurora-1);">SECURE ACCESS</span>
                            <h2 class="font-display text-white mb-1" style="font-size: 2rem;">Sign In</h2>
                            <p class="text-dim">Use your registered email address</p>
                        </div>

                        <transition name="fade-swap">
                            <div v-if="error" class="mb-4 p-3 rounded d-flex align-items-center" style="background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); color: var(--danger); font-size: 0.9rem;">
                                <i class="fas fa-exclamation-circle me-3 fs-5"></i>
                                <span>{{ error }}</span>
                            </div>
                        </transition>

                        <form @submit.prevent="handleLogin">
                            
                            <div class="mb-4">
                                <label class="input-label-glass">Email Address</label>
                                <div class="position-relative">
                                    <i class="fas fa-envelope position-absolute text-faint" style="left: 15px; top: 50%; transform: translateY(-50%); z-index: 10;"></i>
                                    <input 
                                        type="email" 
                                        class="input-glass" 
                                        style="padding-left: 45px;"
                                        v-model="email" 
                                        placeholder="name@example.com" 
                                        required 
                                    />
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="input-label-glass d-flex justify-content-between">
                                    <span>Password</span>
                                    <a href="#" class="text-aurora text-decoration-none" style="color: var(--aurora-2);">Forgot?</a>
                                </label>
                                <div class="position-relative">
                                    <i class="fas fa-lock position-absolute text-faint" style="left: 15px; top: 50%; transform: translateY(-50%); z-index: 10;"></i>
                                    <input 
                                        type="password" 
                                        class="input-glass" 
                                        style="padding-left: 45px;"
                                        v-model="password" 
                                        placeholder="••••••••" 
                                        required 
                                    />
                                </div>
                            </div>

                            <div class="mt-5">
                                <button type="submit" class="btn-aurora w-100 py-3" :disabled="loading">
                                    <span v-if="!loading">Initialize Session <i class="fas fa-arrow-right ms-2"></i></span>
                                    <span v-else><i class="fas fa-spinner fa-spin me-2"></i> Authenticating...</span>
                                </button>
                            </div>

                            <div class="d-block d-md-none text-center mt-4 pt-4 border-top" style="border-color: var(--glass-border-soft) !important;">
                                <p class="text-dim mb-2">New here?</p>
                                <a href="/signup" class="text-aurora fw-bold text-decoration-none" style="color: var(--aurora-1);">Create an account</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="/static/js/login.js"></script>

</body>
</html>
