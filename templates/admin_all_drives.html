<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Drives | Aurora Placement Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/dashboard-theme.css">
</head>
<body class="app-shell">

<div id="app">
    {% raw %}
    <aside class="app-sidebar">
        <div class="sidebar-brand"><i class="fas fa-bolt"></i></div>
        <nav class="sidebar-nav">
            <a class="sidebar-link" href="/admin_dashboard"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a class="sidebar-link active" href="/admin_all_drives"><i class="fas fa-briefcase"></i><span>All Drives</span></a>
            <a class="sidebar-link" href="/admin_students"><i class="fas fa-users"></i><span>Students</span></a>
            <a class="sidebar-link" href="/admin_companies"><i class="fas fa-building"></i><span>Companies</span></a>
        </nav>
        <div class="sidebar-foot">
            <a href="/login" class="sidebar-link"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </aside>

    <main class="app-main">
        <header class="app-topbar">
            <div>
                <span class="topbar-eyebrow">Management</span>
                <h1 class="topbar-title">All Drives</h1>
            </div>
            <div class="d-flex align-items-center gap-4">
                <div class="search-glass-wrap">
                    <i class="fas fa-search search-ico"></i>
                    <input type="text" placeholder="Search drives..." v-model="searchQuery">
                </div>
                <div class="profile-chip"><div class="profile-avatar">A</div></div>
            </div>
        </header>

        <div class="glass-card">
            <div class="glass-card-header"><h5 class="section-title">Placement Drives Directory</h5></div>
            <div class="glass-card-body">
                <div class="table-responsive">
                    <table class="glass-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Drive Title</th>
                                <th>Company</th>
                                <th>Deadline</th>
                                <th>Status</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="drive in filteredDrives" :key="drive.id">
                                <td class="font-mono text-faint">#{{ drive.id }}</td>
                                <td class="cell-strong">{{ drive.title }}</td>
                                <td class="text-dim">{{ drive.company }}</td>
                                <td class="font-mono text-faint">{{ drive.deadline }}</td>
                                <td>
                                    <span class="chip-glass" :class="{
                                        'is-warning': drive.status === 'Pending',
                                        'is-success': drive.status === 'Approved',
                                        'is-danger': drive.status === 'Cancelled' || drive.status === 'Closed'
                                    }">{{ drive.status }}</span>
                                </td>
                                <td class="text-end">
                                    <button class="btn-glass is-info" @click="viewDrive(drive.id)">View</button>
                                </td>
                            </tr>
                            <tr v-if="filteredDrives.length === 0">
                                <td colspan="6"><div class="empty-state-glass">No drives found.</div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    {% endraw %}
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
const { createApp } = Vue;
createApp({
    data() { return { drives: [], searchQuery: "" }; },
    computed: {
        filteredDrives() {
            if (!this.searchQuery) return this.drives;
            const q = this.searchQuery.toLowerCase();
            return this.drives.filter(d => d.title.toLowerCase().includes(q) || d.company.toLowerCase().includes(q));
        }
    },
    mounted() { this.fetchDrives(); },
    methods: {
        getHeaders() {
            const token = localStorage.getItem("access_token");
            if (!token) window.location.href = "/login";
            return { Authorization: `Bearer ${token}`, "Content-Type": "application/json" };
        },
        async fetchDrives() {
            try {
                const res = await fetch("/api/admin/all_drives", { headers: this.getHeaders() });
                if (res.ok) this.drives = await res.json();
            } catch (err) { console.error(err); }
        },
        viewDrive(id) { window.location.href = `/admin_view_drive_details?id=${id}`; }
    }
}).mount("#app");
</script>
</body>
</html>
