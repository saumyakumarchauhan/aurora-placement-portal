<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Drive | Aurora Placement Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/static/css/dashboard-theme.css">
</head>
<body class="app-shell">

<div id="app">
    {% raw %}
    <aside class="app-sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-building"></i>
        </div>
        <nav class="sidebar-nav">
            <a class="sidebar-link" href="/company_dashboard">
                <i class="fas fa-home"></i><span>Dashboard</span>
            </a>
            <a class="sidebar-link active" href="#">
                <i class="fas fa-plus-circle"></i><span>Create Drive</span>
            </a>
        </nav>
        <div class="sidebar-foot">
            <a href="/login" class="sidebar-link">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span>
            </a>
        </div>
    </aside>

    <main class="app-main">
        
        <header class="app-topbar">
            <div>
                <span class="topbar-eyebrow">Initiate Recruitment</span>
                <h1 class="topbar-title">Create a New Drive</h1>
            </div>
            
            <div class="d-flex align-items-center gap-4">
                <a href="/company_dashboard" class="btn-outline-glass">
                    <i class="fas fa-arrow-left me-2"></i> Cancel
                </a>
                <div class="profile-chip">
                    <div class="profile-avatar">C</div>
                </div>
            </div>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="glass-card">
                    <div class="glass-card-header">
                        <h5 class="section-title">Drive Specifications</h5>
                    </div>
                    
                    <div class="glass-card-body padded">
                        
                        <div v-if="errorMessage" class="mb-4 p-3 rounded" style="background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.3); color: var(--danger); font-size: 0.9rem;">
                            <i class="fas fa-exclamation-triangle me-2"></i> {{ errorMessage }}
                        </div>

                        <form @submit.prevent="saveDrive">
                            
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="input-label-glass">Job Title</label>
                                    <input type="text" class="input-glass" v-model="form.jobTitle" placeholder="e.g. Software Engineer" required />
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="input-label-glass">Application Deadline</label>
                                    <input type="date" class="input-glass" v-model="form.deadline" required />
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="input-label-glass">Job Description</label>
                                <textarea class="input-glass" v-model="form.description" rows="4" placeholder="Outline the roles, responsibilities, and expectations..." required></textarea>
                            </div>

                            <hr class="divider-glass">

                            <h5 class="section-title mb-4" style="font-size: 1rem;">Eligibility & Details</h5>
                            
                            <div class="row">
                                <div class="col-md-4 mb-4">
                                    <label class="input-label-glass">Min CGPA</label>
                                    <input type="number" step="0.1" class="input-glass" v-model="form.minCgpa" placeholder="e.g. 7.5" required />
                                </div>
                                <div class="col-md-4 mb-4">
                                    <label class="input-label-glass">Graduation Year</label>
                                    <input type="number" class="input-glass" v-model="form.graduationYear" placeholder="e.g. 2026" required />
                                </div>
                                <div class="col-md-4 mb-4">
                                    <label class="input-label-glass">Eligible Departments</label>
                                    <input type="text" class="input-glass" v-model="form.departments" placeholder="e.g. CSE, ECE" required />
                                </div>
                            </div>

                            <div class="row mb-5">
                                <div class="col-md-6 mb-4">
                                    <label class="input-label-glass">Package / Salary</label>
                                    <input type="text" class="input-glass" v-model="form.packageSalary" placeholder="e.g. 12 LPA" />
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="input-label-glass">Location</label>
                                    <input type="text" class="input-glass" v-model="form.location" placeholder="e.g. Bangalore, India" />
                                </div>
                            </div>

                            <div class="d-flex justify-content-end border-top border-secondary pt-4" style="border-color: var(--glass-border-soft) !important;">
                                <button type="submit" class="btn-aurora px-5" :disabled="loading">
                                    <i class="fas fa-paper-plane me-2" v-if="!loading"></i>
                                    <i class="fas fa-spinner fa-spin me-2" v-else></i>
                                    {{ loading ? 'Transmitting Data...' : 'Launch Drive' }}
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>

    </main>
    {% endraw %}
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="/static/js/company_create_drive.js"></script>

</body>
</html>
